<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Cart - Fruit & Veg Shop</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
      background: #f9f9f9;
      color: #333;
    }

    header {
      background: rgba(255, 255, 255, 0.95);
      padding: 15px;
      text-align: center;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }

    header h1 {
      margin: 0;
      color: #2e7d32;
    }

    nav a {
      margin: 0 10px;
      text-decoration: none;
      color: #007bff;
      font-weight: bold;
    }

    .container {
      max-width: 1000px;
      margin: 30px auto;
      padding: 20px;
      background: rgba(255, 255, 255, 0.98);
      border-radius: 10px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 20px;
    }

    th, td {
      border: 1px solid #ccc;
      padding: 12px;
      text-align: center;
    }

    th {
      background: #f4f4f4;
    }

    button {
      padding: 6px 12px;
      border: none;
      border-radius: 5px;
      background: #ff9800;
      color: white;
      cursor: pointer;
      transition: background 0.3s;
    }

    button:hover {
      background: #e68900;
    }

    .total {
      text-align: right;
      font-size: 20px;
      margin-top: 20px;
      font-weight: bold;
      color: #2e7d32;
    }

    .actions {
      text-align: right;
      margin-top: 20px;
    }

    .btn-link {
      text-decoration: none;
      padding: 10px 15px;
      border-radius: 5px;
      background: #007bff;
      color: white;
      font-weight: bold;
    }

    .btn-link:hover {
      background: #0056b3;
    }
  </style>
</head>
<body>
  <header>
    <h1>Your Cart 🛒</h1>
    <nav>
      <a href="index.html">🏠 Home</a> | 
      <a href="products.html">⬅ Back to Products</a>
    </nav>
  </header>

  <div class="container">
    <table id="cartTable">
      <thead>
        <tr>
          <th>Item</th>
          <th>Price (₹)</th>
          <th>Quantity</th>
          <th>Total (₹)</th>
          <th>Action</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>

    <div class="total" id="cartTotal"></div>

    <div class="actions">
      <a href="checkout.html" class="btn-link">Proceed to Checkout</a>
    </div>
  </div>

  <script>
    function loadCart() {
      let cart = JSON.parse(localStorage.getItem("cart")) || [];
      const tbody = document.querySelector("#cartTable tbody");
      const totalDiv = document.getElementById("cartTotal");
      tbody.innerHTML = "";

      if (cart.length === 0) {
        tbody.innerHTML = "<tr><td colspan='5'>Your cart is empty</td></tr>";
        totalDiv.innerHTML = "";
        return;
      }

      let grandTotal = 0;

      cart.forEach((item, index) => {
        let row = document.createElement("tr");
        let itemTotal = item.price * item.qty;
        grandTotal += itemTotal;

        row.innerHTML = `
          <td>${item.name}</td>
          <td>₹${item.price}</td>
          <td>
            <button onclick="changeQty(${index}, -1)">-</button>
            ${item.qty}
            <button onclick="changeQty(${index}, 1)">+</button>
          </td>
          <td>₹${itemTotal}</td>
          <td><button onclick="removeItem(${index})">Remove</button></td>
        `;

        tbody.appendChild(row);
      });

      totalDiv.innerHTML = `Grand Total: ₹${grandTotal}`;
    }

    function changeQty(index, delta) {
      let cart = JSON.parse(localStorage.getItem("cart")) || [];
      cart[index].qty += delta;

      if (cart[index].qty <= 0) {
        cart.splice(index, 1);
      }

      localStorage.setItem("cart", JSON.stringify(cart));
      loadCart();
    }

    function removeItem(index) {
      let cart = JSON.parse(localStorage.getItem("cart")) || [];
      cart.splice(index, 1);
      localStorage.setItem("cart", JSON.stringify(cart));
      loadCart();
    }

    loadCart();
  </script>
</body>
</html>
