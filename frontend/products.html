<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Products - Fruit & Veg Shop</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
      background: url("https://img.freepik.com/free-photo/variety-fresh-vegetables-fruits_23-2147694163.jpg") no-repeat center center fixed;
      background-size: cover;
      color: #333;
    }

    header {
      background: rgba(255, 255, 255, 0.9);
      padding: 15px;
      text-align: center;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }

    header h1 {
      margin: 0;
      color: #2e7d32;
    }

    nav a {
      margin: 0 10px;
      text-decoration: none;
      color: #007bff;
      font-weight: bold;
    }

    .container {
      max-width: 1100px;
      margin: 30px auto;
      padding: 20px;
      background: rgba(255, 255, 255, 0.95);
      border-radius: 10px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 20px;
    }

    .product {
      border: 1px solid #ddd;
      border-radius: 8px;
      overflow: hidden;
      background: white;
      text-align: center;
      transition: transform 0.2s ease;
    }

    .product:hover {
      transform: scale(1.03);
      box-shadow: 0 4px 10px rgba(0,0,0,0.15);
    }

    .product img {
      width: 100%;
      height: 180px;
      object-fit: cover;
    }

    .product h3 {
      margin: 10px 0 5px;
      font-size: 18px;
      color: #333;
    }

    .product p {
      margin: 5px 0;
      font-weight: bold;
      color: #2e7d32;
    }

    button {
      margin: 10px 0 15px;
      padding: 8px 15px;
      border: none;
      border-radius: 5px;
      background: #ff9800;
      color: white;
      font-weight: bold;
      cursor: pointer;
      transition: background 0.3s;
    }

    button:hover {
      background: #e68900;
    }
  </style>
</head>
<body>
  <header>
    <h1>Our Fresh Products</h1>
    <nav>
      <a href="index.html">🏠 Home</a> | 
      <a href="cart.html">🛒 Cart</a>
    </nav>
  </header>

  <div class="container">
    <div id="products" class="grid"></div>
  </div>

  <script>
    async function loadProducts() {
      try {
        const res = await fetch("http://localhost:5002/api/products");
        if (!res.ok) throw new Error("Network error");
        const products = await res.json();

        const container = document.getElementById("products");
        container.innerHTML = "";

        products.forEach(p => {
          const div = document.createElement("div");
          div.className = "product";
          div.innerHTML = `
            <img src="${p.image}" alt="${p.name}">
            <h3>${p.name}</h3>
            <p>₹${p.price}</p>
            <button onclick="addToCart(${p.id}, '${p.name}', ${p.price})">Add to Cart</button>
          `;
          container.appendChild(div);
        });
      } catch (err) {
        console.error("Failed to load products:", err);
        document.getElementById("products").innerHTML = "<p style='color:red'>Failed to load products</p>";
      }
    }

    function addToCart(id, name, price) {
      let cart = JSON.parse(localStorage.getItem("cart")) || [];
      let existing = cart.find(item => item.id === id);

      if (existing) {
        existing.qty += 1;
      } else {
        cart.push({ id, name, price, qty: 1 });
      }

      localStorage.setItem("cart", JSON.stringify(cart));
      alert(`${name} added to cart!`);
    }

    loadProducts();
  </script>
</body>
</html>
