<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Fruit & Veg Shop</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
      background: url("https://img.freepik.com/free-photo/assortment-fresh-healthy-vegetables_23-2147691013.jpg") no-repeat center center fixed;
      background-size: cover;
      color: #333;
    }

    header {
      background: rgba(255, 255, 255, 0.9);
      padding: 15px;
      text-align: center;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }

    header h1 {
      margin: 0;
      color: #2e7d32;
    }

    nav a {
      margin: 0 10px;
      text-decoration: none;
      color: #007bff;
      font-weight: bold;
    }

    .container {
      max-width: 800px;
      margin: 80px auto;
      padding: 40px;
      background: rgba(255, 255, 255, 0.92);
      border-radius: 10px;
      text-align: center;
    }

    .container h2 {
      margin-bottom: 20px;
      font-size: 28px;
      color: #2e7d32;
    }

    .container p {
      font-size: 18px;
      margin-bottom: 30px;
    }

    .btn {
      padding: 12px 20px;
      border: none;
      border-radius: 5px;
      background: #ff9800;
      color: white;
      font-weight: bold;
      cursor: pointer;
      text-decoration: none;
      font-size: 16px;
      transition: background 0.3s;
    }

    .btn:hover {
      background: #e68900;
    }

    footer {
      text-align: center;
      padding: 15px;
      margin-top: 40px;
      background: rgba(255, 255, 255, 0.9);
      font-size: 14px;
    }
  </style>
</head>
<body>
  <header>
    <h1>Welcome to Fruit & Veg Shop</h1>
    <nav>
      <a href="products.html">🛍 Products</a> | 
      <a href="cart.html">🛒 Cart (<span id="cart-count">0</span>)</a> | 
      <a href="login.html">🔑 Login</a> | 
      <a href="register.html">📝 Register</a>
    </nav>
  </header>

  <div class="container">
    <h2>Fresh Fruits & Vegetables at Your Doorstep</h2>
    <p>Handpicked from farms — Delivered fresh to your home.</p>
    <a class="btn" href="products.html">Shop Now</a>
  </div>

  <footer>
    Built for learning — simple demo project
  </footer>

  <script>
    // Update cart count
    function updateCartCount() {
      const cart = JSON.parse(localStorage.getItem('cart') || '[]');
      const qty = cart.reduce((s,i)=>s+(i.qty||1),0);
      document.getElementById('cart-count').textContent = qty;
    }
    document.addEventListener('DOMContentLoaded', updateCartCount);
  </script>
</body>
</html>
